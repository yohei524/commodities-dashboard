<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㐂 TOOLS — Reel Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .chart-top {
    height: 160px;
    position: relative;
    z-index: 10;
  }

  .chart-top .tv-chart-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  .middle { flex: 1; }

  .chart-bottom {
    height: 160px;
    position: relative;
    z-index: 10;
  }

  .chart-bottom .tv-chart-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<div class="chart-top">
  <div class="tv-chart-container" id="tv-gold"></div>
</div>

<div class="middle"></div>

<div class="chart-bottom">
  <div class="tv-chart-container" id="tv-usdjpy"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
window.addEventListener('load', function() {
  new TradingView.widget({
    "container_id": "tv-gold",
    "autosize": true,
    "symbol": "OANDA:XAUUSD",
    "interval": "D",
    "timezone": "Asia/Tokyo",
    "theme": "dark",
    "style": "1",
    "locale": "ja",
    "toolbar_bg": "rgba(0,0,0,0)",
    "enable_publishing": false,
    "hide_top_toolbar": true,
    "hide_legend": true,
    "hide_side_toolbar": true,
    "save_image": false,
    "backgroundColor": "rgba(0,0,0,0)",
    "gridColor": "rgba(255,255,255,0.03)",
    "range": "6M",
    "allow_symbol_change": false,
    "details": false,
    "calendar": false,
    "hide_volume": true
  });

  new TradingView.widget({
    "container_id": "tv-usdjpy",
    "autosize": true,
    "symbol": "FX:USDJPY",
    "interval": "D",
    "timezone": "Asia/Tokyo",
    "theme": "dark",
    "style": "1",
    "locale": "ja",
    "toolbar_bg": "rgba(0,0,0,0)",
    "enable_publishing": false,
    "hide_top_toolbar": true,
    "hide_legend": true,
    "hide_side_toolbar": true,
    "save_image": false,
    "backgroundColor": "rgba(0,0,0,0)",
    "gridColor": "rgba(255,255,255,0.03)",
    "range": "6M",
    "allow_symbol_change": false,
    "details": false,
    "calendar": false,
    "hide_volume": true
  });
});
</script>
</body>
</html>
