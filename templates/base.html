<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gold Experience{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- ナビゲーション -->
    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span>🏆</span>
                <span class="gold-gradient">Gold</span>
                <span class="silver-gradient">Experience</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{{ 'active' if request.endpoint == 'index' else '' }}">TOP</a></li>
                <li><a href="/gold" class="{{ 'active' if request.endpoint == 'gold' else '' }}">金</a></li>
                <li><a href="/silver" class="{{ 'active' if request.endpoint == 'silver' else '' }}">銀</a></li>
                <li><a href="/kaikata" class="{{ 'active' if request.endpoint == 'kaikata' else '' }}">買い方</a></li>
                <li><a href="/bichiku" class="nav-bichiku {{ 'active' if request.endpoint == 'bichiku' else '' }}">🛡 備蓄</a></li>
            </ul>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- フッター -->
    <footer class="footer">
        <p>Gold Experience | 金と銀の定点観測所</p>
        <p style="font-size: 0.75rem; margin-top: 8px; opacity: 0.7;">
            当サイトは情報提供を目的としたもので、投資助言ではありません。売買の判断はご自身でお願いします。<br>
            一部ページにはアフィリエイトリンク（PR）を含みます。
        </p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
