<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gold Experience{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- ナビゲーション -->
    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span>🏆</span>
                <span class="gold-gradient">Gold</span>
                <span class="silver-gradient">Experience</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{{ 'active' if request.endpoint == 'index' else '' }}">TOP</a></li>
                <li><a href="/weekly" class="{{ 'active' if request.endpoint == 'weekly' else '' }}">週次判断</a></li>
                <li><a href="/gold" class="{{ 'active' if request.endpoint == 'gold' else '' }}">金</a></li>
                <li><a href="/silver" class="{{ 'active' if request.endpoint == 'silver' else '' }}">銀</a></li>
                <li><a href="/copper" class="{{ 'active' if request.endpoint == 'copper' else '' }}">銅</a></li>
                <li><a href="/oil" class="{{ 'active' if request.endpoint == 'oil' else '' }}">原油</a></li>
                <li><a href="/defense-stocks" class="{{ 'active' if request.endpoint == 'defense_stocks' else '' }}">軍需株</a></li>
                <li><a href="/geopolitics" class="{{ 'active' if request.endpoint == 'geopolitics' else '' }}">地政学</a></li>
                <li><a href="/trades" class="{{ 'active' if request.endpoint == 'trades' else '' }}">日誌</a></li>
                <li><a href="/history" class="{{ 'active' if request.endpoint == 'history' else '' }}">検証</a></li>
                <li><a href="/bichiku" class="{{ 'active' if request.endpoint == 'bichiku' else '' }}" style="color:#e8c87a;">備蓄</a></li>
            </ul>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- フッター -->
    <footer class="footer">
        <p>Gold Experience | 個人投資研究用</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
